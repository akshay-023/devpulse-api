services:
  postgres:
    image: postgres:16
    container_name: devpulse_postgres
    restart: always
    environment:
      POSTGRES_USER: devpulse_user
      POSTGRES_PASSWORD: devpulse_password
      POSTGRES_DB: devpulse_db
    ports:
      - "5432:5432"
    volumes:
      - devpulse_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: devpulse_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  devpulse_postgres_data: